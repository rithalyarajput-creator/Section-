<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Product Card</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="scene">
    <div class="card">

      <!-- Image Section -->
      <div class="card-image">
        <img class="img-main" src="https://images.unsplash.com/photo-1542291026-7eec264c27ff?w=600&q=80" alt="Nike Shoe 1" />
        <img class="img-hover" src="https://images.unsplash.com/photo-1608231387042-66d1773070a5?w=600&q=80" alt="Nike Shoe 2" />

        <!-- Best Seller Badge -->
        <span class="badge">Best Seller</span>

        <!-- Wishlist Button -->
        <button class="wishlist-btn" id="wishlistBtn" aria-label="Add to wishlist">
          <svg class="heart-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" width="18" height="18">
            <path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z"/>
          </svg>
        </button>
      </div>

      <!-- Card Body -->
      <div class="card-body">
        <h2 class="product-name">Nike NK Court Vision Low Retro</h2>

        <div class="card-footer">
          <div class="price-pill">₹12,999</div>
          <button class="buy-btn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="15" height="15">
              <path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/>
              <line x1="3" y1="6" x2="21" y2="6"/>
              <path d="M16 10a4 4 0 01-8 0"/>
            </svg>
            Add to Cart
          </button>
        </div>
      </div>

    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
