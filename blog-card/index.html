<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Blog Card</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

  <div class="scene">
    <div class="blog-card">

      <!-- Image + Tags + Fade -->
      <div class="card-image">
        <img src="https://images.unsplash.com/photo-1620712943543-bcc4688e7485?w=900&q=90" alt="Blog cover"/>
        <div class="fade-overlay"></div>
      </div>

      <!-- Content -->
      <div class="card-body">
        <h2 class="blog-title">Real Time Stress Analytics</h2>
        <p class="blog-desc">
          <strong>Neurolens</strong> integrates with your existing tools (Slack, Jira, Teams)
          to deliver <strong>AI-driven mental-health insights</strong> and personalized
          coping strategies—securely and automatically.
        </p>

        <div class="card-footer">
          <span class="blog-date">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="13" height="13">
              <rect x="3" y="4" width="18" height="18" rx="2"/>
              <line x1="16" y1="2" x2="16" y2="6"/>
              <line x1="8" y1="2" x2="8" y2="6"/>
              <line x1="3" y1="10" x2="21" y2="10"/>
            </svg>
            April 22, 2026
          </span>
          <div class="btn-group">
            <button class="btn-dark">Read More</button>
            <button class="btn-outline">Watch Demo</button>
          </div>
        </div>
      </div>

    </div>
  </div>

</body>
</html>
