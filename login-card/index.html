<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login Card</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

  <div class="login-card">

    <!-- Logo -->
    <div class="logo-wrap">
      <div class="logo-circle">
        <svg viewBox="0 0 40 40" fill="none" width="36" height="36">
          <path d="M20 4L34 12V28L20 36L6 28V12L20 4Z" fill="#2d2d2d" opacity="0.85"/>
          <circle cx="20" cy="20" r="5" fill="white"/>
          <circle cx="28" cy="13" r="3.5" fill="white" opacity="0.7"/>
        </svg>
      </div>
    </div>

    <!-- Fields -->
    <div class="fields">

      <div class="input-wrap">
        <input type="text" placeholder="Username" id="username"/>
      </div>

      <div class="input-wrap">
        <input type="password" placeholder="Password" id="password"/>
        <button class="eye-btn" id="eyeBtn" tabindex="-1" aria-label="Toggle password">
          <svg id="eyeIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" width="18" height="18">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
            <circle cx="12" cy="12" r="3"/>
          </svg>
        </button>
      </div>

    </div>

    <!-- Login Button -->
    <button class="login-btn">Login</button>

    <!-- Footer -->
    <p class="footer-text">Don't have an account? <a href="#" class="signup-link">Sign Up</a></p>

  </div>

  <script src="script.js"></script>
</body>
</html>
